<body class="legal-page">
  <header class="legal-header">
    <div class="legal-header-inner">
      <a href="/" class="legal-logo" aria-label="TOMOSU. トップへ戻る">
        <img src="assets/logo-dark.png" alt="TOMOSU."/>
      </a>
      <a href="/" class="legal-back">← Back to Home</a>
    </div>
  </header>

  <main class="legal-main">
    <div class="legal-kicker">— Journal</div>
    <h1 class="legal-title">経営の現場から、<br/>灯りになる言葉を。</h1>
    <div class="legal-title-en">Journal — Notes from the field</div>

    <div id="journal-list" class="journal-list">
      <div class="journal-loading">記事を読み込んでいます ...</div>
    </div>
  </main>

  <footer class="legal-footer">
    <div class="legal-footer-inner">
      <div class="legal-footer-top">
        <a href="/" class="legal-footer-logo" aria-label="TOMOSU. トップへ戻る">
          <img src="assets/logo-light.png" alt="TOMOSU."/>
        </a>
        <nav class="legal-footer-links">
          <a href="/">Home</a>
          <a href="/journal">Journal</a>
          <a href="/privacy">Privacy</a>
          <a href="/tokutei">特定商取引法</a>
          <a href="mailto:info@tomosu-inc.com">Contact</a>
        </nav>
      </div>
      <div class="legal-footer-bottom">
        <span>© <script>document.write(new Date().getFullYear())</script> Tomosu.</span>
        <span>Takashi Ouchi — Founder</span>
      </div>
    </div>
  </footer>

  <script>
    (async () => {
      const list = document.getElementById('journal-list');
      const formatDate = (iso) => {
        if (!iso) return '— —';
        const d = new Date(iso);
        if (isNaN(d.getTime())) return iso;
        return `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, '0')}.${String(d.getDate()).padStart(2, '0')}`;
      };
      const escapeHtml = (s) => String(s ?? '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#039;');

      try {
        const r = await fetch('/api/journal?limit=50');
        if (!r.ok) throw new Error('fetch failed');
        const data = await r.json();
        const items = (data.items || []).filter((i) => i.slug);

        if (items.length === 0) {
          list.innerHTML = '<div class="journal-empty">記事を準備しています</div>';
          return;
        }

        list.innerHTML = items.map((i) => `
          <a class="journal-item" href="/journal/${escapeHtml(i.slug)}">
            <div class="journal-item-date">${escapeHtml(formatDate(i.publishedDate))}</div>
            <div class="journal-item-cat">${escapeHtml(i.category || '')}</div>
            <div class="journal-item-title">${escapeHtml(i.title)}</div>
            <div class="journal-item-more">Read →</div>
          </a>
        `).join('');
      } catch (err) {
        console.error(err);
        list.innerHTML = '<div class="journal-empty">記事の読み込みに失敗しました</div>';
      }
    })();
  </script>
  <script src="/dev-reload.js?v=35"></script>
</body>
</html>
