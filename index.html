<body>
  <div id="root"></div>

  <!-- React 18.3.1 production — 本番用圧縮ビルド -->
  <script crossorigin="anonymous" src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin="anonymous" src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <!-- Babel standalone — JSX をブラウザでトランスパイル（本番でも必要） -->
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="nav-hero.jsx?v=39"></script>
  <script type="text/babel" src="about-services-works.jsx?v=39"></script>
  <script type="text/babel" src="flow-blog-contact.jsx?v=39"></script>

  <script type="text/babel">
    const App = () => {
      React.useEffect(() => {
        const io = new IntersectionObserver((entries) => {
          entries.forEach(e => {
            if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); }
          });
        }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });
        document.querySelectorAll('.hero-title, .hero-sub, .sec-title, .svc-row, .client-cell, .sample, .comm-row, .flow-row, .blog-row, .tinz, .career-row, .phil-vision, .phil-body p, .diff-text, .voice-card, .about-portrait, .about-content, .form-field, .aud-kicker, .aud-item, .aud-close, .contact-assure').forEach(el => {
          el.classList.add('fade-up');
          io.observe(el);
        });
        return () => io.disconnect();
      }, []);

      // Cash App-style background switch: when Philosophy is in view,
      // body transitions to dark; otherwise paper.
      React.useEffect(() => {
        const onScroll = () => {
          const phil = document.getElementById('philosophy');
          if (!phil) return;
          const r = phil.getBoundingClientRect();
          const vh = window.innerHeight || 800;
          // Trigger early so body color is already dark when Philosophy enters.
          const inDark = r.top < vh * 0.8 && r.bottom > vh * 0.2;
          document.body.classList.toggle('bg-dark', inDark);
        };
        window.addEventListener('scroll', onScroll, { passive: true });
        onScroll();
        return () => window.removeEventListener('scroll', onScroll);
      }, []);
      return (<>
        <Nav/>
        <MorphLogo/>
        <main>
          <Hero/>
          <Audience/>
          <Philosophy/>
          <About/>
          <Services/>
          <Training/>
          <Works/>
          <Voice/>
          <Flow/>
          <Blog/>
          <Contact/>
        </main>
        <Footer/>
      </>);
    };
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
  <script src="/dev-reload.js?v=39"></script>
</body>
</html>
